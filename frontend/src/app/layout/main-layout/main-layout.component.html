<mat-sidenav-container class="layout-container">
  <mat-sidenav #sidenav mode="side" opened class="layout-sidenav">
    <mat-nav-list>
      <a
        mat-list-item
        *ngFor="let link of navLinks"
        [routerLink]="link.route"
        routerLinkActive="active-link"
      >
        <mat-icon mat-list-icon>{{ link.icon }}</mat-icon>
        <span mat-line>{{ link.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="layout-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Alternar menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span>Sistema Bancario</span>
    </mat-toolbar>

    <main class="layout-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
