<div class="movimiento-form-container">
  <h2>Nuevo movimiento</h2>

  <form [formGroup]="form" (ngSubmit)="registrar()">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cuenta</mat-label>
      <input matInput
             [formControl]="buscadorCuenta"
             [matAutocomplete]="autoCuenta"
             placeholder="Buscar por número de cuenta o tipo"
             [disabled]="cargandoCuentas">
      <mat-autocomplete #autoCuenta="matAutocomplete"
                         [displayWith]="mostrarCuenta"
                         (optionSelected)="seleccionarCuenta($event.option.value)">
        <mat-option *ngFor="let cuenta of cuentasFiltradas$ | async" [value]="cuenta">
          {{ cuenta.numeroCuenta }} ({{ cuenta.tipoCuenta }})
        </mat-option>
      </mat-autocomplete>
      <mat-error *ngIf="form.get('cuentaId')?.hasError('required')">Debes seleccionar una cuenta</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tipo de movimiento</mat-label>
      <mat-select formControlName="tipoMovimiento" required>
        <mat-option *ngFor="let tipo of tiposMovimiento" [value]="tipo">{{ tipo }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('tipoMovimiento')?.hasError('required')">El tipo de movimiento es obligatorio</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Valor</mat-label>
      <input matInput type="number" formControlName="valor" min="0.01" step="0.01" required>
      <mat-error *ngIf="form.get('valor')?.hasError('required')">El valor es obligatorio</mat-error>
      <mat-error *ngIf="form.get('valor')?.hasError('min')">El valor debe ser mayor a cero</mat-error>
    </mat-form-field>

    <div class="movimiento-form-actions">
      <button mat-button type="button" (click)="cancelar()">Cancelar</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="guardando">Registrar</button>
    </div>
  </form>
</div>
