spring.application.name=cliente

# Render inyecta automaticamente la variable PORT y exige que la app escuche ahi;
# en local/Docker Compose seguimos usando SERVER_PORT (default 8081).
server.port=${PORT:${SERVER_PORT:8081}}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banco_cliente}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

frontend.url=${FRONTEND_URL:http://localhost:4200}
